name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          PREV=$(git tag -l 'v*' --sort=-v:refname | head -2 | tail -1)
          CURR=${{ github.ref_name }}
          if [ -z "$PREV" ] || [ "$PREV" = "$CURR" ]; then
            RANGE="$CURR"
          else
            RANGE="$PREV..$CURR"
          fi
          git log --pretty="format:* %s (%h)" "$RANGE" | gh release create "$CURR" --title "$CURR" --notes-file -
        env:
          GH_TOKEN: ${{ github.token }}
